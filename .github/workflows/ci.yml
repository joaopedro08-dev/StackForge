name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 3 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Scaffold database smoke
        run: pnpm test:scaffold:db

      - name: Scaffold architecture/api smoke
        run: pnpm test:scaffold:arch-api

      - name: Scaffold README conditional sections
        run: pnpm test:scaffold:readme

      - name: Scaffold full runtime smoke
        env:
          SCAFFOLD_FULL_RUNTIME_MODE: ${{ github.event_name == 'schedule' && 'full' || 'quick' }}
        run: pnpm test:scaffold:full-runtime

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        working-directory: web
        run: pnpm lint

      - name: Frontend typecheck
        working-directory: web
        run: pnpm typecheck

      - name: Frontend build
        working-directory: web
        run: pnpm build

  production-smoke:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'schedule'
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare production env file
        run: |
          cp .env.production.example .env.production
          {
            echo "APP_HOST_PORT=3001"
            echo "DATABASE_PROVIDER=postgresql"
            echo "POSTGRES_DB=auth_ci"
            echo "POSTGRES_USER=auth_ci"
            echo "POSTGRES_PASSWORD=auth_ci_password"
            echo "DATABASE_URL=postgresql://auth_ci:auth_ci_password@postgres:5432/auth_ci?schema=public"
            echo "JWT_ACCESS_SECRET=ci_access_secret_123456789"
            echo "JWT_ACCESS_SECRETS=main:ci_access_secret_123456789"
            echo "JWT_ACCESS_ACTIVE_KID=main"
            echo "CORS_ALLOWED_ORIGINS=http://localhost:3001"
          } >> .env.production

      - name: Run recovery and production smoke
        run: pnpm prod:recovery:test

      - name: Stop production stack
        if: always()
        run: pnpm prod:down
