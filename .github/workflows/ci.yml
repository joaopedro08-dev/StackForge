name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level=high

  production-smoke:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare production env file
        run: |
          cp .env.production.example .env.production
          {
            echo "APP_HOST_PORT=3001"
            echo "DATABASE_PROVIDER=postgresql"
            echo "POSTGRES_DB=auth_ci"
            echo "POSTGRES_USER=auth_ci"
            echo "POSTGRES_PASSWORD=auth_ci_password"
            echo "DATABASE_URL=postgresql://auth_ci:auth_ci_password@postgres:5432/auth_ci?schema=public"
            echo "JWT_ACCESS_SECRET=ci_access_secret_123456789"
            echo "JWT_ACCESS_SECRETS=main:ci_access_secret_123456789"
            echo "JWT_ACCESS_ACTIVE_KID=main"
            echo "CORS_ALLOWED_ORIGINS=http://localhost:3001"
          } >> .env.production

      - name: Run recovery and production smoke
        run: pnpm prod:recovery:test

      - name: Stop production stack
        if: always()
        run: pnpm prod:down
